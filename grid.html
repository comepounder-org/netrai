<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NetrAI — 1mm Reference Grid</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
    #info {
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.85);
      padding: 8px 16px;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }
    #info span { color: #aaa; }
    #info strong { color: #4fc3f7; }
    #fullscreen-btn {
      background: #1565c0;
      color: #fff;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="info">
    <div>
      <strong>NetrAI</strong>
      <span id="ppi-label"> — detecting PPI…</span>
    </div>
    <button id="fullscreen-btn" onclick="goFullscreen()">Full Screen</button>
  </div>
  <canvas id="c"></canvas>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    // ── PPI detection ──────────────────────────────────────────────────────
    // Use a 1-inch ruler div trick: create a div with width:1in and measure
    // its pixel width to get the CSS pixel density, then multiply by dpr.
    function detectPPI() {
      const ruler = document.createElement('div');
      ruler.style.cssText = 'width:1in;height:1px;position:absolute;left:-9999px;visibility:hidden';
      document.body.appendChild(ruler);
      const cssPixelsPerInch = ruler.offsetWidth;
      document.body.removeChild(ruler);
      const dpr = window.devicePixelRatio || 1;
      return cssPixelsPerInch * dpr;
    }

    const ppi = detectPPI();
    const pixelsPerMm = ppi / 25.4;

    document.getElementById('ppi-label').textContent =
      ` — ${ppi.toFixed(0)} PPI  •  ${pixelsPerMm.toFixed(2)} px/mm  •  1mm grid`;

    // ── Canvas sizing ──────────────────────────────────────────────────────
    function resize() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width  = window.innerWidth  * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width  = window.innerWidth  + 'px';
      canvas.style.height = window.innerHeight + 'px';
      draw();
    }

    // ── Grid drawing ───────────────────────────────────────────────────────
    function draw() {
      const dpr = window.devicePixelRatio || 1;
      const W = canvas.width;
      const H = canvas.height;
      const step = pixelsPerMm * dpr; // 1mm in physical pixels

      // White background
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);

      // Minor lines (1mm) — light blue
      ctx.strokeStyle = '#90caf9';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      for (let x = 0; x <= W; x += step) {
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
      }
      for (let y = 0; y <= H; y += step) {
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
      }
      ctx.stroke();

      // Major lines (5mm) — darker blue
      ctx.strokeStyle = '#1565c0';
      ctx.lineWidth = 1.0;
      ctx.beginPath();
      for (let x = 0; x <= W; x += step * 5) {
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
      }
      for (let y = 0; y <= H; y += step * 5) {
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
      }
      ctx.stroke();

      // Centre crosshair
      const cx = W / 2, cy = H / 2;
      ctx.strokeStyle = '#f44336';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(cx - 20 * dpr, cy);
      ctx.lineTo(cx + 20 * dpr, cy);
      ctx.moveTo(cx, cy - 20 * dpr);
      ctx.lineTo(cx, cy + 20 * dpr);
      ctx.stroke();

      // 10mm scale bar (bottom-right)
      const barLen = step * 10;
      const bx = W - barLen - 20 * dpr;
      const by = H - 20 * dpr;
      ctx.strokeStyle = '#f44336';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(bx, by);
      ctx.lineTo(bx + barLen, by);
      ctx.stroke();
      ctx.fillStyle = '#f44336';
      ctx.font = `${11 * dpr}px sans-serif`;
      ctx.fillText('10mm', bx, by - 6 * dpr);
    }

    // ── Fullscreen ─────────────────────────────────────────────────────────
    function goFullscreen() {
      const el = document.documentElement;
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    }

    // ── Wake lock (keep screen on) ─────────────────────────────────────────
    async function keepAwake() {
      try {
        if ('wakeLock' in navigator) {
          await navigator.wakeLock.request('screen');
        }
      } catch (_) {}
    }

    window.addEventListener('resize', resize);
    resize();
    keepAwake();
  </script>
</body>
</html>
